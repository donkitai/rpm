<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Payment Request • RPM Logistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d4d;
            --primary-dark: #e63939;
            --primary-glow: rgba(255, 77, 77, 0.4);
            --card-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(255, 77, 77, 0.25);
            --shadow: 0 12px 40px rgba(255, 77, 77, 0.18);
            --radius: 22px;
            --transition: 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #ff4d4d 0%, #ff8c66 100%);
            min-height: 100vh;
            color: #1a1a1a;
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 560px;
            overflow: hidden;
            animation: appear 0.9s ease-out;
        }
        @keyframes appear {
            from { opacity: 0; transform: translateY(40px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2.4rem 2rem 1.8rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 60%);
            animation: shine 12s linear infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(0deg); }
            100% { transform: translateX(100%) rotate(360deg); }
        }
        .header h1 { font-size: 2.1rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        .header p { font-size: 1rem; opacity: 0.92; }
        .form {
            padding: 2.2rem 2rem;
            display: grid;
            gap: 1.8rem;
        }
        .float-group {
            position: relative;
        }
        .float-group input,
        .float-group select,
        .float-group textarea {
            width: 100%;
            padding: 1.25rem 1.1rem 0.5rem;
            font-size: 1.05rem;
            background: rgba(255,255,255,0.55);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            transition: all var(--transition);
            color: #1a1a1a;
            font-weight: 500;
        }
        .float-group input:focus,
        .float-group select:focus,
        .float-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 5px var(--primary-glow);
            background: white;
            transform: translateY(-1px);
        }
        .float-group label {
            position: absolute;
            top: 1.15rem;
            left: 1.2rem;
            font-size: 1.05rem;
            color: #6b7280;
            pointer-events: none;
            transition: all var(--transition);
        }
        .float-group input:focus + label,
        .float-group input:not(:placeholder-shown) + label,
        .float-group select:focus + label,
        .float-group select:not([value=""]) + label,
        .float-group textarea:focus + label,
        .float-group textarea:not(:placeholder-shown) + label {
            top: 0.45rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--primary);
        }
        .multi-entry {
            position: relative;
            margin-bottom: 0.8rem;
        }
        .multi-entry input {
            padding-right: 2.8rem;
        }
        .remove-btn {
            position: absolute;
            right: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 1.1rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-more {
            background: rgba(255, 77, 77, 0.15);
            color: var(--primary);
            border: 1px dashed var(--primary);
            border-radius: 12px;
            padding: 0.6rem 1rem;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 0.5rem;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
        }
        .add-more:hover {
            background: rgba(255, 77, 77, 0.25);
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.6rem;
        }
        @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }
        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 1.25rem;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all var(--transition);
            box-shadow: 0 8px 30px rgba(255, 77, 77, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(255, 77, 77, 0.55);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.8s, height 0.8s;
        }
        .btn:hover::before { width: 500px; height: 500px; }
        .whatsapp-icon { width: 26px; height: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
        #success {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: grid;
            place-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 999;
        }
        #success.show { opacity: 1; pointer-events: all; }
        .success-box {
            background: white;
            padding: 2.8rem 2.2rem;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow);
            transform: scale(0.6);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
        }
        #success.show .success-box { transform: scale(1); }
        .check-icon {
            width: 80px;
            height: 80px;
            color: #22c55e;
            margin-bottom: 1.2rem;
            animation: pop 0.6s ease-out;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            60% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .reference-section { display: none; }
        .reference-section.active { display: block; }
        .open-whatsapp-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 1rem 2.2rem;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px rgba(255, 77, 77, 0.3);
            transition: all 0.2s;
        }
        .open-whatsapp-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>Daily Payment Request</h1>
        <p>Jo jaante ho wahi bharo – baaki chhod do!</p>
    </div>
    <form id="paymentForm" class="form">
        <div class="float-group">
            <input type="date" id="date" required placeholder=" " value="">
            <label for="date">Date</label>
        </div>
        <div class="float-group">
            <select id="ledger" required>
                <option value="" selected disabled hidden></option>
                <option value="Warai Charges">Warai Charges</option>
                <option value="Vehicle Toll Charges">Vehicle Toll Charges</option>
                <option value="Labour Charges">Labour Charges</option>
                <option value="Vehicle Hire Charges">Vehicle Hire Charges</option>
                <option value="Loading & Unloading Charges">Loading & Unloading Charges</option>
                <option value="Lunch & Dinner Expenses">Lunch & Dinner Expenses</option>
                <option value="Petrol & Diesel Expenses">Petrol & Diesel Expenses</option>
                <option value="Vehicle Repair & Maintenance Charges">Vehicle Repair & Maintenance Charges</option>
                <option value="RTO Charges">RTO Charges</option>
                <option value="Road Tax, Permit & Vehicle Registration Charges">Road Tax, Permit & Vehicle Registration Charges</option>
                <option value="Courier Charges">Courier Charges</option>
                <option value="Electricity Charges">Electricity Charges</option>
                <option value="Festivals Celebration Charges">Festivals Celebration Charges</option>
                <option value="Godown Expenses">Godown Expenses</option>
                <option value="Handling Charges">Handling Charges</option>
                <option value="Housekeeping Charges">Housekeeping Charges</option>
                <option value="Internet Charges">Internet Charges</option>
                <option value="Medical Expenses">Medical Expenses</option>
                <option value="Miscellaneous Expenses">Miscellaneous Expenses</option>
                <option value="Mobile & Telephone Expenses">Mobile & Telephone Expenses</option>
                <option value="Office Expenses">Office Expenses</option>
                <option value="Printing & Stationery Charges">Printing & Stationery Charges</option>
                <option value="Rent Charges (Room)">Rent Charges (Room)</option>
                <option value="Rent Charges (W/H)">Rent Charges (W/H)</option>
                <option value="Rent Charges (P&M)">Rent Charges (P&M)</option>
                <option value="Machine Repair & Maintenance">Machine Repair & Maintenance</option>
                <option value="Salary Expenses">Salary Expenses</option>
                <option value="Security Service Charges">Security Service Charges</option>
                <option value="Tea & Snack Expenses">Tea & Snack Expenses</option>
                <option value="Travelling Expenses">Travelling Expenses</option>
                <option value="Vehicle Insurance Charges">Vehicle Insurance Charges</option>
                <option value="Water Charges">Water Charges</option>
                <option value="Computer Repairs & Maintenance">Computer Repairs & Maintenance</option>
                <option value="Electric Repairing Charges">Electric Repairing Charges</option>
                <option value="Godown Maintenance Charges">Godown Maintenance Charges</option>
            </select>
            <label for="ledger">Ledger Name</label>
        </div>
        <div class="float-group">
            <input type="tel" inputmode="numeric" pattern="[0-9]*" id="amount" placeholder=" " required>
            <label for="amount">Amount</label>
        </div>
        <!-- LR Branch -->
        <div class="float-group" id="lrBranchSection">
            <label>LR Branch</label>
            <div id="lrBranchEntries">
                <div class="multi-entry">
                    <input type="text" class="lr-branch-input" placeholder=" " maxlength="50">
                </div>
            </div>
            <button type="button" class="add-more" onclick="addEntry('lrBranch')">+ Add More Branch</button>
        </div>
        <!-- Vehicle No -->
        <div class="float-group">
            <input type="text" id="vehicleNo" placeholder=" " maxlength="12">
            <label for="vehicleNo">Vehicle No</label>
        </div>
        <!-- Reference Type -->
        <div class="float-group">
            <select id="referenceType" onchange="showReferenceField()">
                <option value="">-- Select Reference Type --</option>
                <option value="lrNo">LR No</option>
                <option value="challanNo">Challan No</option>
                <option value="drsNo">DRS No</option>
            </select>
            <label for="referenceType">Reference Type</label>
        </div>
        <!-- LR No -->
        <div class="float-group reference-section" id="lrNoSection">
            <label>LR No</label>
            <div id="lrNoEntries">
                <div class="multi-entry">
                    <input type="tel" inputmode="numeric" pattern="[0-9]*" class="lr-no-input" placeholder=" " maxlength="20">
                </div>
            </div>
            <button type="button" class="add-more" onclick="addEntry('lrNo')">+ Add More LR No</button>
        </div>
        <!-- Challan No -->
        <div class="float-group reference-section" id="challanNoSection">
            <label>Challan No</label>
            <div id="challanNoEntries">
                <div class="multi-entry">
                    <input type="tel" inputmode="numeric" pattern="[0-9]*" class="challan-no-input" placeholder=" " maxlength="20">
                </div>
            </div>
            <button type="button" class="add-more" onclick="addEntry('challanNo')">+ Add More Challan</button>
        </div>
        <!-- DRS No -->
        <div class="float-group reference-section" id="drsNoSection">
            <label>DRS No</label>
            <div id="drsNoEntries">
                <div class="multi-entry">
                    <input type="tel" inputmode="numeric" pattern="[0-9]*" class="drs-no-input" placeholder=" " maxlength="20">
                </div>
            </div>
            <button type="button" class="add-more" onclick="addEntry('drsNo')">+ Add More DRS</button>
        </div>
        <div class="float-group">
            <textarea id="spRemarks" rows="3" placeholder=" "></textarea>
            <label for="spRemarks">SP Remarks</label>
        </div>
        <button type="submit" class="btn">
            <svg class="whatsapp-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Submit via WhatsApp
        </button>
    </form>
</div>

<div id="success">
    <div class="success-box">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <h2>Success!</h2>
        <p>Tap below to open WhatsApp</p>
        <!-- The button will be added dynamically via JS -->
    </div>
</div>

<script>
    const WHATSAPP_NUMBER = "919503269123";

    // Today's date
    document.getElementById('date').value = new Date().toISOString().split('T')[0];

    // Vehicle No uppercase + no space
    document.getElementById('vehicleNo').addEventListener('input', e => {
        e.target.value = e.target.value.toUpperCase().replace(/\s+/g, '');
    });

    // LR Branch uppercase + only letters & space
    document.querySelectorAll('.lr-branch-input').forEach(el => {
        el.addEventListener('input', function() {
            this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g, '');
        });
    });

    // Numeric only
    document.querySelectorAll('#amount, .lr-no-input, .challan-no-input, .drs-no-input').forEach(el => {
        el.addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    });

    function addEntry(type) {
        const container = document.getElementById(type + 'Entries');
        const newEntry = document.createElement('div');
        newEntry.className = 'multi-entry';
        let inputClass = '';
        let maxLength = 20;
        if (type === 'lrBranch') {
            inputClass = 'lr-branch-input';
            maxLength = 50;
        } else if (type === 'lrNo') {
            inputClass = 'lr-no-input';
        } else if (type === 'challanNo') {
            inputClass = 'challan-no-input';
        } else if (type === 'drsNo') {
            inputClass = 'drs-no-input';
        }
        const input = document.createElement('input');
        input.type = (type === 'lrBranch') ? 'text' : 'tel';
        input.className = inputClass;
        input.placeholder = ' ';
        input.maxLength = maxLength;
        if (type !== 'lrBranch') {
            input.setAttribute('inputmode', 'numeric');
            input.setAttribute('pattern', '[0-9]*');
        }
        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '×';
        removeBtn.onclick = () => newEntry.remove();
        newEntry.appendChild(input);
        newEntry.appendChild(removeBtn);
        container.appendChild(newEntry);

        if (type === 'lrBranch') {
            input.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/[^A-Z\s]/g, '');
            });
        } else {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        }
    }

    function showReferenceField() {
        const select = document.getElementById('referenceType');
        const value = select.value;
        document.querySelectorAll('.reference-section').forEach(sec => sec.classList.remove('active'));
        if (value) {
            document.getElementById(value + 'Section').classList.add('active');
        }
    }

    document.getElementById('paymentForm').addEventListener('submit', e => {
        e.preventDefault();

        const lrBranches = Array.from(document.querySelectorAll('.lr-branch-input'))
            .map(el => el.value.trim()).filter(v => v);

        let lrNos = [], challanNos = [], drsNos = [];
        const refType = document.getElementById('referenceType').value;

        if (refType === 'lrNo') {
            lrNos = Array.from(document.querySelectorAll('.lr-no-input'))
                .map(el => el.value.trim()).filter(v => v);
        } else if (refType === 'challanNo') {
            challanNos = Array.from(document.querySelectorAll('.challan-no-input'))
                .map(el => el.value.trim()).filter(v => v);
        } else if (refType === 'drsNo') {
            drsNos = Array.from(document.querySelectorAll('.drs-no-input'))
                .map(el => el.value.trim()).filter(v => v);
        }

        const data = {
            date: document.getElementById('date').value,
            ledger: document.getElementById('ledger').value,
            amount: document.getElementById('amount').value,
            lrBranch: lrBranches.join(', '),
            lrNo: lrNos.join(', '),
            vehicleNo: document.getElementById('vehicleNo').value.trim(),
            challanNo: challanNos.join(', '),
            drsNo: drsNos.join(', '),
            spRemarks: document.getElementById('spRemarks').value.trim()
        };

        let formattedDate = '';
        if (data.date) {
            const [yyyy, mm, dd] = data.date.split('-');
            formattedDate = `${dd}-${mm}-${yyyy}`;
        }

        let msg = `💰 *Daily Payment Request*\n\n`;
        if (data.date) msg += `📅 *Date:* ${formattedDate}\n`;
        if (data.ledger) msg += `📋 *Ledger Name:* ${data.ledger}\n`;
        if (data.amount) {
            const amtNum = Number(data.amount);
            msg += `💰 *Amount:* ₹${amtNum.toLocaleString('en-IN')}\n`;
        }
        msg += `💳 *Tr. Type:* \n🔢 *UTR No:* \n`;
        if (data.lrBranch) msg += `🏢 *LR Branch:* ${data.lrBranch}\n`;
        if (data.lrNo) msg += `📄 *LR No:* ${data.lrNo}\n`;
        if (data.vehicleNo) msg += `🚗 *Vehicle No:* ${data.vehicleNo}\n`;
        if (data.challanNo) msg += `📋 *Challan No:* ${data.challanNo}\n`;
        if (data.drsNo) msg += `📑 *DRS No:* ${data.drsNo}\n`;
        if (data.spRemarks) msg += `\n📝 *SP Remarks:* ${data.spRemarks}\n`;

        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;

        // Show success popup
        const successEl = document.getElementById('success');
        successEl.classList.add('show');

        // Update text
        document.querySelector('#success p').textContent = "Tap below to open WhatsApp";

        // Add clickable WhatsApp button
        const successBox = document.querySelector('.success-box');
        const openBtn = document.createElement('a');
        openBtn.href = url;
        openBtn.target = '_blank';
        openBtn.rel = 'noopener noreferrer';
        openBtn.className = 'open-whatsapp-btn';
        openBtn.textContent = 'Open in WhatsApp';
        successBox.appendChild(openBtn);

        // Auto-close after 12 seconds (or user can tap the button)
        setTimeout(() => {
            successEl.classList.remove('show');
            openBtn.remove();
            location.reload();
        }, 12000);
    });
</script>
</body>
</html>
